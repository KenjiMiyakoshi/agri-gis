<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>agri-gis 管理 - テーマ編集</title>
    <link rel="stylesheet" href="./src/style.css" />
    <style>
      /* D'202 (WD'2) admin-style.html 専用スタイル */
      body { margin: 0; font-family: 'Segoe UI', sans-serif; }
      #admin-app {
        display: grid;
        grid-template-rows: auto 1fr auto;
        grid-template-columns: 1fr 1fr;
        height: 100vh;
        gap: 0;
      }
      #admin-header {
        grid-row: 1; grid-column: 1 / 3;
        padding: 8px 16px; background: #2e7d32; color: white;
        display: flex; align-items: center; gap: 16px;
      }
      #admin-header h1 { margin: 0; font-size: 16px; }
      #admin-header select, #admin-header button {
        font-size: 13px; padding: 4px 8px;
      }
      #admin-header button { background: #ffeb3b; border: none; cursor: pointer; }
      #admin-header button:disabled { background: #ccc; cursor: not-allowed; }
      #admin-status { font-size: 12px; opacity: 0.9; }
      #admin-editor {
        grid-row: 2; grid-column: 1;
        display: flex; flex-direction: column;
        border-right: 1px solid #ccc;
      }
      #editor-tabs {
        display: flex; gap: 4px; padding: 4px; background: #f5f5f5; border-bottom: 1px solid #ccc;
      }
      #editor-tabs button {
        font-size: 12px; padding: 4px 12px; border: 1px solid #999;
        background: #fff; cursor: pointer;
      }
      #editor-tabs button.active { background: #2e7d32; color: white; border-color: #1b5e20; }
      #json-editor, #sld-editor {
        flex: 1; font-family: 'Consolas', monospace; font-size: 12px;
        border: none; resize: none; padding: 8px; outline: none;
      }
      #admin-preview {
        grid-row: 2; grid-column: 2;
        position: relative;
      }
      #preview-map { width: 100%; height: 100%; }
      #admin-colorramp {
        grid-row: 3; grid-column: 1 / 3;
        padding: 8px 16px; background: #f5f5f5; border-top: 1px solid #ccc;
        display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      }
      #admin-colorramp label { font-size: 12px; display: flex; align-items: center; gap: 4px; }
      #admin-colorramp select, #admin-colorramp input { font-size: 12px; padding: 2px 6px; }
      #admin-colorramp button { font-size: 12px; padding: 4px 12px; cursor: pointer; }
      #ramp-preview {
        display: flex; height: 24px; min-width: 160px; border: 1px solid #999;
      }
      #ramp-preview div { flex: 1; }
      #stats-info { font-size: 11px; color: #555; }
    </style>
  </head>
  <body>
    <div id="admin-app">
      <header id="admin-header">
        <h1>テーマ編集</h1>
        <label>Layer: <select id="admin-layer-select"></select></label>
        <label>Theme: <input id="admin-theme-name" type="text" value="default" size="16" /></label>
        <button id="admin-save-btn" disabled>保存 (PUT)</button>
        <span id="admin-status">読み込み中...</span>
      </header>
      <section id="admin-editor">
        <div id="editor-tabs">
          <button id="tab-json" class="active">JSON</button>
          <button id="tab-sld">SLD (read-only)</button>
        </div>
        <textarea id="json-editor" spellcheck="false"></textarea>
        <textarea id="sld-editor" spellcheck="false" readonly style="display:none"></textarea>
      </section>
      <section id="admin-preview">
        <div id="preview-map"></div>
      </section>
      <section id="admin-colorramp">
        <label>属性: <select id="ramp-field"><option value="">(選択)</option></select></label>
        <label>階級数: <input id="ramp-bins" type="number" min="2" max="20" value="5" style="width:50px" /></label>
        <label>方式:
          <select id="ramp-method">
            <option value="quantile">Quantile</option>
            <option value="equal">EqualInterval</option>
          </select>
        </label>
        <label>パレット:
          <select id="ramp-palette">
            <option value="Viridis">Viridis</option>
            <option value="RdYlGn">RdYlGn</option>
            <option value="YlOrRd">YlOrRd</option>
          </select>
        </label>
        <button id="ramp-apply">JSON に反映</button>
        <div id="ramp-preview"></div>
        <span id="stats-info"></span>
      </section>
    </div>
    <script type="module" src="./src/admin/main.ts"></script>
  </body>
</html>
